name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Verify build artifacts exist
        shell: bash
        run: |
          echo "=== Build artifacts ==="
          if [ "$RUNNER_OS" = "Windows" ]; then
            ls -lh src-tauri/target/release/bundle/nsis/*.exe && echo "✓ Windows NSIS installer"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            ls -lh src-tauri/target/release/bundle/dmg/*.dmg && echo "✓ macOS DMG"
          elif [ "$RUNNER_OS" = "Linux" ]; then
            ls -lh src-tauri/target/release/bundle/appimage/*.AppImage && echo "✓ Linux AppImage"
            ls -lh src-tauri/target/release/bundle/deb/*.deb && echo "✓ Linux DEB"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: klodock-${{ runner.os }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: ignore
