name: OpenClaw Compatibility

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  compat:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Install latest OpenClaw from npm
        run: npm install openclaw@latest

      - name: Run Rust tests
        id: rust_tests
        working-directory: src-tauri
        continue-on-error: true
        run: cargo test 2>&1 | tee test-output.txt

      - name: Create issue on failure
        if: steps.rust_tests.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('src-tauri/test-output.txt', 'utf8');
            const truncated = output.length > 3000 ? output.slice(-3000) : output;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `OpenClaw compatibility failure - ${new Date().toISOString().slice(0, 10)}`,
              body: [
                '## Nightly OpenClaw Compatibility Test Failed',
                '',
                `**Date:** ${new Date().toISOString()}`,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '### Test Output (last 3000 chars)',
                '```',
                truncated,
                '```',
              ].join('\n'),
              labels: ['bug', 'compatibility'],
            });
