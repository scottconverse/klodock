name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Run frontend tests
        run: npx vitest run

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: KloDock ${{ github.ref_name }}
          releaseBody: |
            ## KloDock ${{ github.ref_name }}

            Desktop GUI for OpenClaw — zero terminal, full control.

            ### Download

            | Platform | File |
            |----------|------|
            | **Windows** | `.exe` installer (NSIS) |
            | **macOS** | `.dmg` disk image |
            | **Linux** | `.AppImage` or `.deb` |

            ### What's new

            See [CHANGELOG](https://github.com/scottconverse/klodock/blob/main/README.md#status) for details.

            ### Notes

            - **macOS**: Unsigned — you may need to right-click → Open on first launch.
            - **Linux**: AppImage requires `--no-sandbox` flag if running without FUSE.
          releaseDraft: false
          prerelease: false
